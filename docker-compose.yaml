services:
  forex-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      APP_ENV: dev
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  test-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      APP_ENV: test
    volumes:
      - test-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    profiles: ["test"]

  prefect-db:
    image: postgres:15
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prefect-server:
    image: prefecthq/prefect:3.6.17-python3.13
    command: prefect server start
    ports:
      - "4200:4200"
    depends_on:
      - prefect-db
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PREFECT_SERVER_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@prefect-db:5432/prefect

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: prefect worker start --pool default-agent-pool
    working_dir: /app
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PYTHONPATH: /app
    depends_on:
      prefect-server:
        condition: service_started
    volumes:
      - ./src/:/app/src
    restart: always

  flow:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    command: python -m src.gmo.ws-connection
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOCAL_STORAGE_PATH: /flow-storage
      PYTHONPATH: /app
    depends_on:
      prefect-server:
        condition: service_started
    volumes:
      - flow-storage:/flow-storage
      - ./src/:/app/src
      - ./config/:/app/config
    restart: always

  ws-ticker-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    working_dir: /app
    command: python -m src.gmo.ws_ticker_server
    environment:
      PYTHONPATH: /app
      WS_HOST: 0.0.0.0
      WS_PORT: 8765
    depends_on:
      - forex-db
    volumes:
      - ./src/gmo:/app/src/gmo
      - ./src/database:/app/src/database
      - ./src/config:/app/src/config
      - ./config:/app/config
    ports:
      - "8765:8765"
    restart: always

  alembic:
    build:
      context: .
      dockerfile: docker/alembic.Dockerfile
    working_dir: /app
    command:
      - alembic
      - current
    environment:
      PYTHONPATH: /app
    depends_on:
      - forex-db
    volumes:
      - ./:/app
    profiles: ["tools"]

  test:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
    working_dir: /app
    environment:
      PYTHONPATH: /app
      APP_ENV: test
    depends_on:
      - test-db
    volumes:
      - ./:/app
    profiles: ["test"]

  ui-server:
    image: python:3.12-slim
    working_dir: /app
    command: python -m http.server 8080 --directory /app/ui
    volumes:
      - ./ui:/app/ui:ro
    ports:
      - "8080:8080"
    restart: always
volumes:
  db-data:
  test-db-data:
  flow-storage:
  postgres_data:

